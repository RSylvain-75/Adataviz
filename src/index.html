<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Events</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="page_accueil">

    <header id="entete">
        <h1 id="logo">Paris Events</h1>
        <nav id="navigation"></nav>
    </header>

    <main id="contenu_principal">

        <section id="presentation">
            <article class="bloc_presentation">
                <h2 id="titre_presentation" class="titre_section"></h2>
                <p id="texte_presentation" class="texte_presentation"></p>
                <ul id="filtres_rapides" class="liste_filtres_rapides"></ul>
            </article>

            <aside class="bloc_prochains_evenements">
                <h2 id="titre_prochains" class="titre_section"></h2>
                <ol id="prochains_evenements" class="liste_prochains_evenements"></ol>
            </aside>
        </section>

        <section id="slider">
            <button id="slider_precedent" class="bouton_slider" type="button">&#10094;</button>

            <figure class="figure_slider">
                <img id="image_slider" class="image_slider" src="" alt="">
                <figcaption id="texte_slider" class="texte_slider"></figcaption>
            </figure>

            <button id="slider_suivant" class="bouton_slider" type="button">&#10095;</button>
        </section>

        <section id="zone_filtres">
            <form id="formulaire_filtres">
                <label id="label_recherche" class="label_filtre" for="recherche"></label>
                <input class="champ_filtre" type="search" id="recherche" placeholder="Nom d'un événement">

                <label id="label_categorie" class="label_filtre" for="categorie"></label>
                <select class="champ_filtre" id="categorie"></select>

                <label id="label_prix" class="label_filtre" for="prix"></label>
                <select class="champ_filtre" id="prix"></select>

                <button id="bouton_tri" type="submit"></button>
            </form>
        </section>

        <section id="liste_evenements">
            <h2 id="titre_liste_evenements" class="titre_section"></h2>
        </section>

        <section id="carte">
            <h2 id="titre_carte" class="titre_section"></h2>

            <figure class="figure_carte">
                <iframe
                    class="iframe_carte"
                    src="https://www.openstreetmap.org/export/embed.html?bbox=2.25%2C48.80%2C2.45%2C48.90&amp;layer=mapnik">
                </iframe>

                <figcaption id="texte_carte" class="texte_carte"></figcaption>
            </figure>
        </section>

    </main>

    <footer id="pied_page">
        <p id="texte_footer" class="texte_footer"></p>
    </footer>

    <script type="module" src="main.js"></script>

</body>

</html>
